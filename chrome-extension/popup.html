<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MeetingAI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
    }

    .header {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34D399;
    }

    .content {
      padding: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #94A3B8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .meeting-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .meeting-title {
      font-size: 13px;
      font-weight: 600;
      color: #0F172A;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meeting-from {
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 10px;
    }

    .meeting-actions {
      display: flex;
      gap: 6px;
    }

    .btn-approve {
      flex: 1;
      padding: 7px;
      background: linear-gradient(135deg, #0EA5E9, #6366F1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-decline {
      padding: 7px 12px;
      background: #FEF2F2;
      color: #EF4444;
      border: 1px solid #FECACA;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #94A3B8;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 13px;
      line-height: 1.6;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #E2E8F0;
      display: flex;
      gap: 8px;
    }

    .btn-scan {
      flex: 1;
      padding: 9px;
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-dashboard {
      padding: 9px 14px;
      background: #fff;
      color: #374151;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .notification {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 10px;
      display: none;
    }

    .notification.success {
      background: #ECFDF5;
      color: #065F46;
      border: 1px solid #A7F3D0;
    }

    .notification.error {
      background: #FEF2F2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #94A3B8;
      font-size: 13px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: #0F172A;
    }

    .stat-label {
      font-size: 10px;
      color: #94A3B8;
      margin-top: 2px;
    }

    .not-logged-in {
      padding: 24px;
      text-align: center;
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">MeetingAI</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="content">
    <div class="notification" id="notification"></div>
    <div id="mainContent">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <button class="btn-scan" id="scanBtn">📧 Scan inbox</button>
    <button class="btn-dashboard" id="dashboardBtn">Dashboard →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
